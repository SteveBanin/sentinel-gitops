apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespaces.yaml
  - api-service/deployment.yaml
  - api-service/service.yaml
  - worker-service/deployment.yaml
  - worker-service/service.yaml
  - postgres/deployment.yaml
  - postgres/service.yaml

# Optional: generate Grafana dashboard ConfigMaps from infra/grafana/dashboards
configMapGenerator:
  - name: sentinel-grafana-dashboards
    namespace: monitoring
    files:
      - grafana/dashboards/sentinel-overview.json
    options:
      labels:
        grafana_dashboard: "1"
