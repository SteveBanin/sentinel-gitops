apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker-service
  namespace: sentinel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: worker-service
  template:
    metadata:
      labels:
        app: worker-service
    spec:
      containers:
        - name: worker-service
          image: sentinel/worker-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8081
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          env:
            - name: SENTINEL_API_BASE_URL
              value: "http://api-service:8080"
            - name: DB_HOST
              value: "sentinel-postgres"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: "sentinel"
            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: sentinel-postgres-secret
                  key: POSTGRES_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: sentinel-postgres-secret
                  key: POSTGRES_PASSWORD

          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 12

          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6

          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: http
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3