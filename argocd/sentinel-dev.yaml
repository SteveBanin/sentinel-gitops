apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sentinel-dev
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/SteveBanin/sentinel-gitops.git
    targetRevision: main
    path: apps/sentinel/overlays/dev
  destination:
    server: https://kubernetes.default.svc
    namespace: sentinel-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
