apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sentinel-prod
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/SteveBanin/sentinel-gitops.git
    targetRevision: main
    path: apps/sentinel/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: sentinel-prod
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
